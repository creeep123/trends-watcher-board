<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background: Linear dark (#08090a) with subtle border -->
  <rect width="128" height="128" rx="24" fill="#08090a"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Trend line: indigo-violet accent -->
  <polyline points="30,88 52,72 74,80 98,48"
            fill="none"
            stroke="#7170ff"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Arrow tip -->
  <polyline points="90,52 98,48 96,56"
            fill="none"
            stroke="#7170ff"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="30" cy="88" r="4" fill="#7170ff"/>
  <circle cx="52" cy="72" r="4" fill="#5e6ad2"/>
  <circle cx="74" cy="80" r="4" fill="#5e6ad2"/>
  <circle cx="98" cy="48" r="4.5" fill="#828fff"/>
</svg>
